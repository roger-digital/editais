<script>
let TODOS = [];

function matches(item, cargo, uf, situacao) {
  if (cargo.trim()) {
    const words = cargo.toLowerCase().trim().split(/\\s+/);
    const t = (item.orgao + " " + (item.vagas || "") + " " + (item.estado || "")).toLowerCase();
    if (!words.every(w => t.includes(w))) return false;
  }
  if (uf && item.uf !== uf && item.tipo !== "instituto_federal") return false;
  if (situacao && item.situacao !== situacao) return false;
  return true;
}

function renderCard(item) {
  const isIF  = item.tipo === "instituto_federal";
  const isPrev = item.situacao === "Previsto";
  let cls = "card" + (isIF ? " if-card" : isPrev ? " previsto" : "");
  const badge = isIF
    ? `<span class="badge bif">🏫 Instituto Federal</span>`
    : isPrev
    ? `<span class="badge bp">📋 Previsto</span>`
    : `<span class="badge ba">✅ Aberto</span>`;
  const tagUF  = item.uf    ? `<span class="tag">${item.uf}</span> ` : "";
  const tagFonte = item.fonte ? `<span class="tag green">${item.fonte}</span> ` : "";
  return `
  <div class="${cls}">
    <div class="ch">
      <div>${tagUF}${tagFonte}<div class="ctitle">${item.orgao}</div></div>
      <div class="badges">${badge}</div>
    </div>
    <div class="cb">
      ${item.vagas  ? `<div>🏛️ <strong>Vagas:</strong> ${item.vagas}</div>` : ""}
      ${item.prazo  ? `<div>📅 <strong>Prazo:</strong> ${item.prazo}</div>` : ""}
      ${item.estado && item.uf  ? `<div>📍 <strong>Estado:</strong> ${item.estado}</div>` : ""}
      ${item.estado && !item.uf ? `<div>📍 <strong>Instituição:</strong> ${item.estado}</div>` : ""}
    </div>
    <div class="cf">${item.link ? `<a href="${item.link}" target="_blank">🔗 Ver edital</a>` : ""}</div>
  </div>`;
}

function filtrar() {
  const cargo    = document.getElementById("cargo").value;
  const uf       = document.getElementById("estado").value;
  const situacao = document.getElementById("situacao").value;
  const showCNB  = document.getElementById("f-cnb").checked;
  const showIF   = document.getElementById("f-if").checked;

  let items = TODOS.filter(it => {
    if (!showCNB && it.tipo === "concurso_publico")  return false;
    if (!showIF  && it.tipo === "instituto_federal") return false;
    return matches(it, cargo, uf, situacao);
  });

  const nCNB   = items.filter(i => i.tipo !== "instituto_federal").length;
  const nIF    = items.filter(i => i.tipo === "instituto_federal").length;
  const nAb    = items.filter(i => i.situacao === "Aberto").length;
  const nPrev  = items.filter(i => i.situacao === "Previsto").length;
  document.getElementById("s-total").textContent  = items.length;
  document.getElementById("s-cnb").textContent    = nCNB;
  document.getElementById("s-if").textContent     = nIF;
  document.getElementById("s-abertos").textContent = nAb;
  document.getElementById("s-prev").textContent   = nPrev;
  document.getElementById("stats").style.display  = "flex";

  const cont = document.getElementById("results");
  cont.innerHTML = items.length === 0
    ? `<div class="empty">😕 Nenhum resultado.<br/><small style="color:#475569">Tente outro termo ou deixe em branco para ver todos.</small></div>`
    : items.map(renderCard).join("");
}

async function carregarDados() {
  document.getElementById("loading").style.display = "block";
  try {
    const res  = await fetch("data.json?t=" + Date.now());
    const data = await res.json();
    TODOS      = data.resultados || [];
    document.getElementById("ultima-atualizacao").textContent = data.atualizado_em || "—";
    document.getElementById("loading").style.display = "none";
    filtrar();
  } catch(e) {
    document.getElementById("loading").innerHTML =
      `<div style="color:#f87171">❌ Erro ao carregar data.json.<br/><small>Rode o scraper.py para gerar o arquivo.</small></div>`;
  }
}

document.getElementById("cargo").addEventListener("keydown", e => { if(e.key==="Enter") filtrar(); });
["f-cnb","f-if"].forEach(id => document.getElementById(id).addEventListener("change", filtrar));
["estado","situacao"].forEach(id => document.getElementById(id).addEventListener("change", filtrar));

carregarDados();
</script>
</body>
</html>
